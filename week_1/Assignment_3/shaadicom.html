<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shaadi.com</title>
</head>
<body>
    <h1>Welcome to Shaadi.com</h1>
    <p>Your one-stop destination for finding your perfect life partner.</p>
    <p>To find your perfect soulmate please fill in the necessary details:</p>
    <form action="submit.html">
        <label for="name">Name:</label><br>
        <input type="text" id="name" name="name" required><br><br>

        <label for="age">Age:</label><br>
        <input type="number" id="age" name="age" required><br><br>

        <label for="gender">Select your Gender:</label><br>
        <label for="gender">Male</label>
        <input type="radio" id="gender" name="gender" value="male" required>
        <label for="gender">Female</label>
        <input type="radio" id="gender" name="gender" value="female" required><br><br>

        <label for="dob">Date of Birth:</label><br>
        <input type="date" id="dob" name="dob" required><br><br>

        <label for="religion">Select your Religion:</label><br>
        <select id="religion" name="religion" required>
            <option value="hindu">Hindu</option>
            <option value="muslim">Muslim</option>
            <option value="christian">Christian</option>
            <option value="sikh">Sikh</option>
            <option value="jain">Jain</option>
            <option value="buddhist">Buddhist</option>
        </select><br><br>

        <label for="country">Select your Country:</label><br>
        <select id="country" name="country" required>
            <option value="india">India</option>
            <option value="usa">USA</option>
            <option value="uk">UK</option>
            <option value="canada">Canada</option>
            <option value="australia">Australia</option>
        </select><br><br>

        <button type="submit" value="Submit">Submit</button>
    </form>
</body>
</html>
