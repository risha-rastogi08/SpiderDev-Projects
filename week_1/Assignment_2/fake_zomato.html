<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato</title>
</head>
<body color="white" bgcolor="lightpink">
    <h1>Welcome to Zomato</h1>
    <p>Your one-stop destination for food delivery and restaurant discovery.</p>
    <h2>Explore some of the Top Restaurants</h2>
    <ul>
        <li><a href="Olivebar.html">Olive Bar & Kitchen</a></li>
        <li><a href="Kylin.html">Kylin Experience</a></li>
        <li><a href="Sandoz.html">Sandoz</a></li>
        <li><a href="CeLaVie.html">Cé La Vie Kitchen & Bar</a></li>
    </ul>
    <h2>Order Now</h2>

    <p>
        Accepting your orders live!!
        <form action="https://www.zomato.com/" method="get">
            <label for="restaurant">Select a restaurant:</label>
            <select name="restaurant" id="restaurant">
                <option value="Olivebar">Olive Bar & Kitchen</option>
                <option value="Kylin">Kylin Experience</option>
                <option value="Sandoz">Sandoz</option>
                <option value="CeLaVie">Cé La Vie Kitchen & Bar</option>
            </select>
            <select name="menu_item" id="menu_item">
                <option value="item1">Pasta</option>
                <option value="item2">Salmon</option>
                <option value="item3">Steak</option>
                <option value="item4">Vegetarian Delight</option>
                <option value="item5">Sundae Brownie</option>
            </select>
            <input type="submit" value="Order Now">
    </p>
</body>
</html>
